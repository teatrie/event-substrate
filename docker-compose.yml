services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.2
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://host.docker.internal:9092

    ports:
      - "9092:9092"
      - "29092:29092"
      - "9644:9644"
    volumes:
      - ./redpanda-bootstrap.yaml:/etc/redpanda/.bootstrap.yaml:ro
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_started
    healthcheck:
      test: [ "CMD", "rpk", "cluster", "health" ]
      interval: 10s
      timeout: 3s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redpanda-auth-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.2
    container_name: redpanda-auth-init
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./scripts/setup-redpanda-auth-internal.sh:/setup.sh:ro
    entrypoint: [ "/bin/bash", "/setup.sh" ]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    depends_on:
      redpanda-auth-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'redpanda:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_PLAINTEXT
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: SCRAM-SHA-256
      SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.scram.ScramLoginModule required username="schema-admin" password="schema-admin-local-pw";
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      # Allow browser-direct uploads from the Vite frontend dev server
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
      # Webhook notification for media upload events → API Gateway
      MINIO_NOTIFY_WEBHOOK_ENABLE_GATEWAY: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_GATEWAY: "http://host.docker.internal:8080/webhooks/media-upload"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    volumes:
      - ./scripts/minio-init.sh:/minio-init.sh:ro
    entrypoint: [ "/bin/sh", "/minio-init.sh" ]

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      - NESSIE_VERSION_STORE_TYPE=IN_MEMORY
      - NESSIE_CATALOG_DEFAULT_WAREHOUSE=sandbox
      - NESSIE_CATALOG_WAREHOUSES_SANDBOX_LOCATION=s3://redpanda/
      - NESSIE_CATALOG_WAREHOUSES_SANDBOX_S3_ACCESS_KEY_ID=admin
      - NESSIE_CATALOG_WAREHOUSES_SANDBOX_S3_SECRET_ACCESS_KEY=password
      - NESSIE_CATALOG_WAREHOUSES_SANDBOX_S3_ENDPOINT=http://minio:9000
      - NESSIE_CATALOG_WAREHOUSES_SANDBOX_S3_PATH_STYLE_ACCESS=true
      - NESSIE_CATALOG_WAREHOUSES_SANDBOX_S3_REGION=local
    tmpfs:
      - /tmp
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:19120/api/v2/config" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------------------------------------------------------------------
  # Telemetry Stack
  # ----------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    volumes:
      - ./telemetry/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.90.0
    container_name: otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./telemetry/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC receiver (for Go)
      - "4318:4318" # OTLP HTTP receiver (for Flink)
      - "8125:8125/udp" # StatsD receiver (for Flink)
    depends_on:
      - jaeger
      - prometheus
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/kafka-sasl.xml:/etc/clickhouse-server/config.d/kafka-sasl.xml:ro
    networks:
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: event-substrate-network

volumes:
  clickhouse_data:
