[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I", "S", "UP"]

[tool.ruff.lint.per-file-ignores]
"flink_jobs/sql_runner.py" = ["S608", "E501"]  # SQL f-strings and long Avro field definitions are intentional
"flink_jobs/tests/*" = ["S101"]  # assert in tests is fine
"pyflink_jobs/test_*" = ["S101"]
"pyflink_jobs/*.py" = ["E501", "UP017"]  # Long JAAS strings; datetime.UTC requires Python 3.11+ but PyFlink runs 3.10
"pyspark_apps/**/test_*" = ["S101"]
"airflow/dags/*" = ["F401"]  # unused imports in DAG files are common (Airflow discovers them)

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
explicit_package_bases = true

[[tool.mypy.overrides]]
module = "airflow.*"
ignore_errors = true

[tool.sqlfluff.core]
dialect = "postgres"
templater = "raw"
max_line_length = 120
exclude_rules = "LT02,LT09,LT12,RF05,CP03,CP04,CP05"

[tool.sqlfluff.indentation]
indent_unit = "space"
tab_space_size = 2

[tool.sqlfluff.templater.raw]
