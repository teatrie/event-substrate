version: '3'

vars:
  GATEWAY_IMAGE: event-substrate-api-gateway:latest
  CONSUMER_IMAGE: event-substrate-message-consumer:latest
  MEDIA_SERVICE_IMAGE: event-substrate-media-service:latest
  PYFLINK_IMAGE: pyflink-custom:1.18.0
  SPARK_BASE_IMAGE: spark-base:latest
  SPARK_IMAGE: pyspark/identity-daily-login-aggregates:latest

includes:
  go:
    taskfile: ./go-services/Taskfile.yml
    dir: .
  spark:
    taskfile: ./pyspark_apps/Taskfile.yml
    dir: .
  flink:
    taskfile: ./flink_jobs/Taskfile.yml
    dir: .
  frontend:
    taskfile: ./frontend/Taskfile.yml
    dir: frontend
  airflow:
    taskfile: ./airflow/Taskfile.yml
    dir: .
  builders:
    taskfile: ./taskfiles/builders.yml
    dir: .
  infra:
    taskfile: ./taskfiles/infra.yml
    dir: .
  helm:
    taskfile: ./taskfiles/helm.yml
    dir: .
  lint:
    taskfile: ./taskfiles/lint.yml
    dir: .
  check:
    taskfile: ./taskfiles/check.yml
    dir: .
  test:
    taskfile: ./taskfiles/test.yml
    dir: .
  lineage:
    taskfile: ./taskfiles/lineage.yml
    dir: .
  telemetry:
    taskfile: ./taskfiles/telemetry.yml
    dir: .

tasks:
  # ---------------------------------------------------------------------------
  # Prerequisites
  # ---------------------------------------------------------------------------
  prereqs:
    desc: Check and install required CLI tools
    cmds:
      - |
        if ! command -v brew &> /dev/null; then
          echo "❌ Homebrew is required but not installed." && exit 1
        fi
        for tool in jq helm supabase kubectl; do
          if ! command -v $tool &> /dev/null; then
            case $tool in
              supabase) brew install supabase/tap/supabase ;;
              *) brew install $tool ;;
            esac
          fi
        done

  # ---------------------------------------------------------------------------
  # Composite Workflows
  # ---------------------------------------------------------------------------
  init:
    desc: First-time full platform setup
    cmds:
      - task: prereqs
      - task: infra:supabase
      - task: infra:docker
      - task: infra:auth
      - task: infra:minio-webhook
      - task: infra:wait:schema-registry
      - task: infra:schemas
      - task: infra:topics
      - task: infra:operators
      - task: flink:deploy
      - task: go:build
      - task: helm:install
      - task: infra:clickhouse
      - echo "🎉 Initialization Complete!"
      - echo "Supabase Studio{{":"}} http://127.0.0.1:54323"
      - echo "MinIO Console{{":"}}   http://127.0.0.1:9001 (admin/password)"
      - echo "----------------------------------------------------------"
      - echo "🔑 Supabase Anon Key (for frontend/.env){{":"}}"
      - supabase status -o json | jq -r .anon_key
      - echo "----------------------------------------------------------"

  start:
    desc: Start platform (rebuilds only changed Go services)
    cmds:
      - task: infra:supabase
      - task: infra:docker
      - task: infra:auth
      - task: infra:minio-webhook
      - task: infra:wait:schema-registry
      - task: infra:schemas
      - task: infra:topics
      - task: flink:configmaps
      - task: flink:deploy
      - task: go:build
      - task: helm:install
      - task: telemetry:kube-metrics:install
      - task: infra:clickhouse
      - task: lineage:start
      - echo "✅ Platform is up and running!"
      - echo "Supabase Studio{{":"}} http://127.0.0.1:54323"
      - echo "MinIO Console{{":"}}   http://127.0.0.1:9001 (admin/password)"
      - echo "Marquez UI{{":"}}      http://127.0.0.1:3001"

  shutdown:
    desc: Stop everything
    cmds:
      - echo "🛑 Shutting down Event-Driven Substrate..."
      - helm uninstall event-substrate 2>/dev/null || true
      - kubectl delete -f kubernetes/flink-deployment.yaml --ignore-not-found
      - kubectl delete -f kubernetes/pyflink-deployment.yaml --ignore-not-found
      - kubectl delete -f kubernetes/credit-check-deployment.yaml --ignore-not-found
      - kubectl delete -f kubernetes/ttl-expiry-deployment.yaml --ignore-not-found
      - kubectl delete -f kubernetes/move-saga-deployment.yaml --ignore-not-found
      - docker compose down
      - task: lineage:shutdown
      - supabase stop
      - kubectl scale deployment airflow-scheduler airflow-api-server airflow-dag-processor -n airflow --replicas=0 2>/dev/null || true
      - kubectl scale statefulset airflow-triggerer -n airflow --replicas=0 2>/dev/null || true
      - echo "✅ Shutdown complete."

  purge:
    desc: Nuclear teardown — destroy all state and rebuild from scratch
    cmds:
      - task: shutdown
      - echo "🧹 Destroying all persistent state..."
      - task: telemetry:kube-metrics:purge
      - docker compose down -v
      - supabase stop --no-backup
      - helm uninstall airflow -n airflow 2>/dev/null || true
      - kubectl delete -f airflow/pv-local.yaml --ignore-not-found 2>/dev/null || true
      - kubectl delete namespace airflow --ignore-not-found 2>/dev/null || true
      - task: lineage:purge
      - task: spark:purge
      - task: clean
      - echo "✅ Purge complete. Run 'task init' to rebuild from scratch."

  # ---------------------------------------------------------------------------
  # Batch Layer (Airflow + Spark + Lineage)
  # ---------------------------------------------------------------------------
  batch:up:
    desc: Install and start the full batch layer (Airflow, Spark Operator, Marquez)
    cmds:
      - task: spark:install
      - task: airflow:install
      - task: lineage:start
      - bash scripts/setup-marquez.sh
      - echo ""
      - echo "✅ Batch layer ready."
      - echo "  Airflow UI{{":"}}  task airflow:ui → http://localhost:8280 (admin/admin)"
      - echo "  Marquez UI{{":"}}  http://localhost:3001"
      - echo "  Spark{{":"}}       task spark:build → task spark:submit"

  batch:down:
    desc: Stop the batch layer (scale Airflow to 0, stop Marquez, delete SparkApplications)
    cmds:
      - task: airflow:shutdown
      - task: lineage:shutdown
      - kubectl delete sparkapplications --all -A --ignore-not-found 2>/dev/null || true
      - echo "✅ Batch layer stopped."

  batch:purge:
    desc: Destroy all batch layer state (Airflow, Spark Operator, Marquez)
    cmds:
      - task: airflow:purge
      - task: spark:purge
      - task: lineage:purge
      - echo "✅ Batch layer purged."

  # ---------------------------------------------------------------------------
  # Aliases
  # ---------------------------------------------------------------------------
  lint:
    desc: Run all linters
    cmds:
      - task: lint:all

  check:
    desc: Run all linters and type checks
    cmds:
      - task: lint:all
      - task: check:types

  # ---------------------------------------------------------------------------
  # Cold-Start Regression
  # ---------------------------------------------------------------------------
  test:cold-start:
    desc: Full cold-start regression — purge all state, rebuild from scratch, run all tests
    cmds:
      - task: clean
      - task: purge
      - task: init
      - task: test:e2e
      - |
        # Start Vite dev server in background for browser tests
        cd frontend && npm install && npx vite --host 127.0.0.1 &
        VITE_PID=$!
        trap "kill $VITE_PID 2>/dev/null" EXIT

        # Wait for Vite to be ready (up to 30s)
        echo "⏳ Waiting for Vite dev server on :5173..."
        for i in $(seq 1 30); do
          if curl -s http://127.0.0.1:5173 > /dev/null 2>&1; then
            echo "✅ Vite dev server ready."
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Vite dev server failed to start." && exit 1
          fi
          sleep 1
        done

        # Run browser tests
        cd tests/browser && npm install && npx playwright install chromium && npx playwright test

  # ---------------------------------------------------------------------------
  # Utility
  # ---------------------------------------------------------------------------
  status:
    desc: Show status of all services
    cmds:
      - echo "--- Supabase ---"
      - supabase status || true
      - echo ""
      - echo "--- Docker Compose ---"
      - docker compose ps
      - echo ""
      - echo "--- Kubernetes ---"
      - kubectl get pods -A --no-headers 2>/dev/null || echo "No K8s pods found"
      - echo ""
      - echo "--- Airflow ---"
      - kubectl get pods -n airflow 2>/dev/null || echo "Airflow not installed"
      - echo ""
      - echo "--- Spark Applications ---"
      - kubectl get sparkapplications -A 2>/dev/null || echo "No SparkApplications found"
      - echo ""
      - echo "--- Marquez (Lineage) ---"
      - 'curl -sf http://localhost:5050/api/v1/namespaces > /dev/null 2>&1 && echo "Marquez API: healthy (http://localhost:5050)" || echo "Marquez: not running"'

  clean:
    desc: Remove build checksums (forces full rebuild on next run)
    cmds:
      - rm -rf .task/
      - echo "✅ Build cache cleared."
