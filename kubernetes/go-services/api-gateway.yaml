apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: go-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: event-substrate-api-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: REDPANDA_BROKERS
          value: "host.docker.internal:9092"
        - name: SCHEMA_REGISTRY_URL
          value: "http://host.docker.internal:8081"
        - name: WEBHOOK_SECRET
          value: "super-secret-webhook-key"
        - name: KAFKA_SASL_MECHANISM
          value: "SCRAM-SHA-256"
        - name: KAFKA_SASL_USERNAME
          value: "api-gateway"
        - name: KAFKA_SASL_PASSWORD
          value: "api-gateway-local-pw"
        # Supabase JWT verification (ES256 via JWKS, HS256 via secret as fallback)
        - name: SUPABASE_JWKS_URL
          value: "http://host.docker.internal:54321/auth/v1/.well-known/jwks.json"
        - name: SUPABASE_JWT_SECRET
          value: "super-secret-jwt-token-with-at-least-32-characters-long"
        # Upload handler: MinIO + Postgres for credit checks and presigned URLs
        - name: SUPABASE_DB_URL
          value: "postgres://postgres:postgres@host.docker.internal:54322/postgres?sslmode=disable"
        - name: MINIO_ENDPOINT
          value: "host.docker.internal:9000"
        - name: MINIO_ACCESS_KEY
          value: "admin"
        - name: MINIO_SECRET_KEY
          value: "password"
        - name: MINIO_BUCKET
          value: "media-uploads"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://host.docker.internal:4317"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: routes-config
          mountPath: /app/routes.yaml
          subPath: routes.yaml
      volumes:
      - name: routes-config
        configMap:
          name: api-gateway-routes
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: go-microservices
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
