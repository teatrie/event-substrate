apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-consumer
  namespace: go-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-consumer
  template:
    metadata:
      labels:
        app: message-consumer
    spec:
      containers:
      - name: message-consumer
        image: event-substrate-message-consumer:latest
        imagePullPolicy: Never
        env:
        - name: REDPANDA_BROKERS
          value: "host.docker.internal:9092"
        - name: SCHEMA_REGISTRY_URL
          value: "http://host.docker.internal:8081"
        - name: SUPABASE_DB_URL
          value: "postgres://postgres:postgres@host.docker.internal:54322/postgres?sslmode=disable"
        - name: KAFKA_SASL_MECHANISM
          value: "SCRAM-SHA-256"
        - name: KAFKA_SASL_USERNAME
          value: "message-consumer"
        - name: KAFKA_SASL_PASSWORD
          value: "message-consumer-local-pw"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://host.docker.internal:4317"
        ports:
        - containerPort: 8091
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8091
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8091
          initialDelaySeconds: 5
          periodSeconds: 10
