name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      message-consumer: ${{ steps.filter.outputs.message-consumer }}
      media-service: ${{ steps.filter.outputs.media-service }}
      any-go: ${{ steps.filter.outputs.any-go }}
      spark-base: ${{ steps.filter.outputs.spark-base }}
      spark-identity: ${{ steps.filter.outputs.spark-identity }}
      any-spark: ${{ steps.filter.outputs.any-spark }}
      pyflink: ${{ steps.filter.outputs.pyflink }}
      helm: ${{ steps.filter.outputs.helm }}
      flink-sql: ${{ steps.filter.outputs.flink-sql }}
      frontend: ${{ steps.filter.outputs.frontend }}
      any-python: ${{ steps.filter.outputs.any-python }}
      any-sql: ${{ steps.filter.outputs.any-sql }}
      any-yaml: ${{ steps.filter.outputs.any-yaml }}
      any-k8s: ${{ steps.filter.outputs.any-k8s }}
      any-docs: ${{ steps.filter.outputs.any-docs }}
      any-mermaid: ${{ steps.filter.outputs.any-mermaid }}
      builders: ${{ steps.filter.outputs.builders }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'go-services/api-gateway/**'
            message-consumer:
              - 'go-services/message-consumer/**'
            media-service:
              - 'go-services/media-service/**'
            any-go:
              - 'go-services/**'
            spark-base:
              - 'Dockerfile.spark.base'
              - 'pyspark_apps/common/**'
              - 'pyspark_apps/pyproject.toml'
            spark-identity:
              - 'pyspark_apps/identity/**'
            any-spark:
              - 'pyspark_apps/**'
              - 'Dockerfile.spark.base'
            pyflink:
              - 'Dockerfile.pyflink'
              - 'pyflink_jobs/**'
            helm:
              - 'charts/**'
            flink-sql:
              - 'flink_jobs/**'
            frontend:
              - 'frontend/**'
              - '!frontend/node_modules/**'
            any-python:
              - 'pyspark_apps/**'
              - 'pyflink_jobs/**'
              - 'flink_jobs/**'
            any-sql:
              - 'flink_jobs/*.sql'
              - 'supabase/migrations/**'
            any-yaml:
              - '*.yaml'
              - '*.yml'
              - 'kubernetes/**'
              - 'telemetry/**'
              - 'airflow/**'
              - 'charts/**'
            any-k8s:
              - 'kubernetes/**'
            any-docs:
              - '**/*.md'
              - '.markdownlint-cli2.yaml'
            any-mermaid:
              - 'docs/architecture/*.mmd'
            builders:
              - 'docker/builders/**'

  # ---------------------------------------------------------------------------
  # Tests (containerized)
  # ---------------------------------------------------------------------------
  test-go:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-go == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/go-builder:latest
    steps:
      - uses: actions/checkout@v4
      - name: Test api-gateway
        if: needs.detect-changes.outputs.api-gateway == 'true'
        run: cd go-services/api-gateway && go test ./...
      - name: Test message-consumer
        if: needs.detect-changes.outputs.message-consumer == 'true'
        run: cd go-services/message-consumer && go test ./...
      - name: Test media-service
        if: needs.detect-changes.outputs.media-service == 'true'
        run: cd go-services/media-service && go test ./...

  test-spark:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-spark == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/pyspark-builder:latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pytest pyspark_apps/ -v

  # ---------------------------------------------------------------------------
  # Lint (containerized)
  # ---------------------------------------------------------------------------
  lint-helm:
    needs: detect-changes
    if: needs.detect-changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-lint:latest
    steps:
      - uses: actions/checkout@v4
      - run: helm lint charts/event-substrate/

  lint-go:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-go == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/go-builder:latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for svc in api-gateway message-consumer media-service; do
            cd go-services/$svc && golangci-lint run ./... && cd ../..
          done

  lint-python-flink:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-python == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/pyflink-builder:latest
    steps:
      - uses: actions/checkout@v4
      - run: ruff check --target-version py310 flink_jobs/ pyflink_jobs/
      - run: ruff format --check --target-version py310 flink_jobs/ pyflink_jobs/

  lint-python-spark:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-python == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/pyspark-builder:latest
    steps:
      - uses: actions/checkout@v4
      - run: ruff check pyspark_apps/ airflow/dags/
      - run: ruff format --check pyspark_apps/ airflow/dags/

  lint-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/frontend-builder:latest
    steps:
      - uses: actions/checkout@v4
      - run: cd frontend && npm ci && npx eslint .

  lint-sql:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-sql == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-lint:latest
    steps:
      - uses: actions/checkout@v4
      - run: sqlfluff lint supabase/migrations/*.sql

  lint-yaml:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-yaml == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-lint:latest
    steps:
      - uses: actions/checkout@v4
      - run: yamllint -c .yamllint.yml .

  lint-k8s:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-k8s == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-lint:latest
    steps:
      - uses: actions/checkout@v4
      - run: >-
          kubeconform
          --schema-location default
          --skip FlinkDeployment,SparkApplication,ScaledObject
          --strict
          kubernetes/*.yaml
          kubernetes/go-services/*.yaml

  lint-markdown:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-docs == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-lint:latest
    steps:
      - uses: actions/checkout@v4
      - run: markdownlint-cli2 '**/*.md'

  lint-mermaid:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-mermaid == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/infra-lint:latest
    steps:
      - uses: actions/checkout@v4
      - run: maid docs/architecture/

  # ---------------------------------------------------------------------------
  # Type Checks (containerized)
  # ---------------------------------------------------------------------------
  check-types-python-flink:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-python == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/pyflink-builder:latest
    steps:
      - uses: actions/checkout@v4
      - run: mypy --python-version 3.10 --ignore-missing-imports --explicit-package-bases flink_jobs/ pyflink_jobs/

  check-types-python-spark:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-python == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/pyspark-builder:latest
    steps:
      - uses: actions/checkout@v4
      - run: mypy --ignore-missing-imports --explicit-package-bases pyspark_apps/ airflow/dags/

  # ---------------------------------------------------------------------------
  # Build & Push (unchanged — uses production Dockerfiles)
  # ---------------------------------------------------------------------------
  build-push-api-gateway:
    needs: [detect-changes, test-go, lint-go]
    if: >-
      github.event_name == 'push' &&
      needs.detect-changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./go-services/api-gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api-gateway:latest

  build-push-message-consumer:
    needs: [detect-changes, test-go, lint-go]
    if: >-
      github.event_name == 'push' &&
      needs.detect-changes.outputs.message-consumer == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./go-services/message-consumer
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/message-consumer:${{ github.sha }}
            ghcr.io/${{ github.repository }}/message-consumer:latest

  build-push-media-service:
    needs: [detect-changes, test-go, lint-go]
    if: >-
      github.event_name == 'push' &&
      needs.detect-changes.outputs.media-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./go-services/media-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/media-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/media-service:latest

  build-push-spark:
    needs: [detect-changes, test-spark, lint-python-spark]
    if: >-
      github.event_name == 'push' &&
      (needs.detect-changes.outputs.spark-identity == 'true' ||
       needs.detect-changes.outputs.spark-base == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push spark-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.spark.base
          target: base
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/spark-base:${{ github.sha }}
            ghcr.io/${{ github.repository }}/spark-base:latest
      - name: Tag spark-base for local use
        run: docker tag ghcr.io/${{ github.repository }}/spark-base:${{ github.sha }} spark-base:latest
      - name: Build and push spark-identity-daily-login-aggregates
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pyspark_apps/identity/daily_login_aggregates/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/spark-identity-daily-login-aggregates:${{ github.sha }}
            ghcr.io/${{ github.repository }}/spark-identity-daily-login-aggregates:latest

  build-push-pyflink:
    needs: [detect-changes]
    if: >-
      github.event_name == 'push' &&
      needs.detect-changes.outputs.pyflink == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pyflink
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/pyflink:${{ github.sha }}
            ghcr.io/${{ github.repository }}/pyflink:latest

  # ---------------------------------------------------------------------------
  # CI Gate (aggregates all conditional jobs for branch protection)
  # ---------------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - test-go
      - test-spark
      - lint-helm
      - lint-go
      - lint-python-flink
      - lint-python-spark
      - lint-frontend
      - lint-sql
      - lint-yaml
      - lint-k8s
      - lint-markdown
      - lint-mermaid
      - check-types-python-flink
      - check-types-python-spark
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::CI gate failed — upstream job result: $r"
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped"
