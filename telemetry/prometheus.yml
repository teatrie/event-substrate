global:
  scrape_interval: 15s

# Enable OTel remote write
remote_write: []

scrape_configs:
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redpanda
    static_configs:
      - targets: ["host.docker.internal:9644"]
    metrics_path: /public_metrics

  - job_name: minio
    static_configs:
      - targets: ["host.docker.internal:9000"]
    metrics_path: /minio/v2/metrics/cluster

  - job_name: kube-state-metrics
    static_configs:
      - targets: ["host.docker.internal:30080"]
