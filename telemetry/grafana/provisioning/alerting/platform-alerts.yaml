apiVersion: 1

# Contact points — add Slack webhook or email here for real notifications
contactPoints:
  - orgId: 1
    name: platform-alerts
    receivers:
      - uid: platform-alerts-receiver
        type: webhook
        settings:
          url: "http://localhost:9999/alert"  # Replace with Slack/email webhook in production
          httpMethod: POST
        disableResolveMessage: false

# Notification policies
policies:
  - orgId: 1
    receiver: platform-alerts
    group_by: ["alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h

# Alert rules
groups:
  - orgId: 1
    name: platform-health
    folder: Platform
    interval: 1m
    rules:

      # Flink job uptime — fires if any job has been down for > 2 minutes
      - uid: flink-job-down
        title: "Flink Job Down"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                flink_jobmanager_job_uptime == 0
                or absent(flink_jobmanager_job_uptime)
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Flink job is down"
          description: "A Flink job has had uptime=0 for more than 2 minutes. Check kubectl logs for the JobManager pod."
        labels:
          severity: critical

      # Postgres connections — fires if active connections exceed 80% of max
      # Local Supabase default max_connections = 97 (pooled), threshold = ~78
      - uid: postgres-connections-high
        title: "Postgres Connections Near Limit"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                pg_stat_activity_count > 70
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "Postgres connection count is high"
          description: "Active Postgres connections exceeded 70. Risk of FATAL: remaining connection slots reserved. Run: SELECT count(*), state FROM pg_stat_activity GROUP BY state;"
        labels:
          severity: warning

      # Kafka consumer lag — fires if consumer lag exceeds threshold (Redpanda metric)
      - uid: kafka-consumer-lag-high
        title: "Kafka Consumer Lag High"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                redpanda_kafka_consumer_group_lag > 20
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group lag exceeded 20 messages. KEDA should be scaling — check consumer pod health and topic throughput."
        labels:
          severity: warning

      # Go service health — fires if any Go service health endpoint is unreachable
      - uid: go-service-down
        title: "Go Service Health Check Failed"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                absent(http_server_active_requests) == 1
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        annotations:
          summary: "Go service is not reporting metrics"
          description: "No http_server_active_requests metric detected from Go services. Check if api-gateway, media-service, or message-consumer pods are running."
        labels:
          severity: critical

      # Go service high error rate — fires if HTTP 5xx rate exceeds 5%
      - uid: go-service-high-error-rate
        title: "Go Service High Error Rate"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                (sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) / sum(rate(http_server_request_duration_seconds_count[5m]))) > 0.05
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Go service error rate is above 5%"
          description: "More than 5% of HTTP requests are returning 5xx status codes over the last 5 minutes."
        labels:
          severity: warning

      # Go service high latency — p99 > 5s
      - uid: go-service-high-latency
        title: "Go Service High Latency"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le)) > 5
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Go service p99 latency is above 5 seconds"
          description: "The 99th percentile request latency has exceeded 5 seconds for 5 minutes."
        labels:
          severity: warning

      # Media saga DLQ growing — dead-letter topics receiving messages
      - uid: media-saga-dlq-growing
        title: "Media Saga Dead-Letter Queue Growing"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                rate(kafka_consumer_messages_total{topic=~"internal.media.*.dead-letter"}[5m]) > 0
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Media saga dead-letter queue is receiving messages"
          description: "Messages are flowing to the media DLQ, indicating saga failures after max retries. Check move-saga-processor and delete-retry-handler logs."
        labels:
          severity: warning

      # Redpanda disk usage high
      - uid: redpanda-disk-high
        title: "Redpanda Disk Usage High"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                (1 - (redpanda_storage_disk_free_bytes / redpanda_storage_disk_total_bytes)) > 0.8
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Redpanda disk usage is above 80%"
          description: "Redpanda broker disk usage has exceeded 80%. Consider increasing storage or adjusting retention policies."
        labels:
          severity: warning

      # K8s pod crash loop — fires if any pod is restarting repeatedly
      - uid: k8s-pod-crashloop
        title: "K8s Pod CrashLoopBackOff"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                rate(kube_pod_container_status_restarts_total[5m]) > 0
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "Kubernetes pod is crash-looping"
          description: "A pod container has been restarting repeatedly over the last 5 minutes. Check pod logs: kubectl logs <pod> -n <namespace>"
        labels:
          severity: warning

      # K8s pod stuck pending — fires if any pod is pending for > 5 minutes
      - uid: k8s-pod-pending
        title: "K8s Pod Pending"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                kube_pod_status_phase{phase="Pending"} > 0
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Kubernetes pod is stuck in Pending state"
          description: "A pod has been in Pending state for more than 5 minutes. Check node resources and scheduling constraints: kubectl describe pod <pod> -n <namespace>"
        labels:
          severity: warning

      # Airflow scheduler down — fires if scheduler heartbeat is absent
      - uid: airflow-scheduler-down
        title: "Airflow Scheduler Down"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                absent(airflow_scheduler_heartbeat_total)
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Airflow scheduler is not reporting heartbeats"
          description: "No airflow_scheduler_heartbeat metric detected for 2 minutes. Check scheduler pod: kubectl get pods -n airflow"
        labels:
          severity: critical

      # Airflow DAG failure rate — fires if DAG runs are failing
      - uid: airflow-dag-failure
        title: "Airflow DAG Failure Rate"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                rate(airflow_dagrun_duration_total{state="failed"}[5m]) > 0
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Airflow DAG runs are failing"
          description: "One or more Airflow DAG runs have failed in the last 5 minutes. Check Airflow UI: task airflow:ui → http://localhost:8280"
        labels:
          severity: warning
