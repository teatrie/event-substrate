# Airflow Helm chart values — local development (OrbStack K8s).
#
# Chart: apache-airflow/airflow 1.19.0 (Airflow 3.1.7)
# Executor: KubernetesExecutor (each task = isolated pod)
# DAGs: hostPath PVC (airflow-dags-pvc) — edit on Mac, see in pods instantly
# DB: embedded PostgreSQL (Helm subchart)
# Auth: admin / admin (webserverSecretKey is dev-only)
# Resources: ~650m CPU requests, ~1.4Gi RAM requests (burst to 1.7 CPU / 2.4Gi)
# -------------------------------------------------------------------

# -- Executor ----------------------------------------------------------
executor: KubernetesExecutor

# -- Global environment vars (applied to all pods) ---------------------
env:
  - name: OPENLINEAGE_URL
    value: "http://host.docker.internal:5050"
  - name: OPENLINEAGE_NAMESPACE
    value: "airflow"

# -- API Server (Airflow 3.x — replaces webserver) --------------------
apiServer:
  startupProbe:
    failureThreshold: 30          # 30 * 10s = 300s for cold start
    periodSeconds: 10
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Web server (defaultUser still read by createUserJob in chart 1.19.0) --
webserver:
  defaultUser:
    enabled: true
    username: admin
    password: admin
    firstName: Admin
    lastName: User
    email: admin@example.com
    role: Admin

# -- Scheduler ---------------------------------------------------------
scheduler:
  startupProbe:
    failureThreshold: 30          # 30 * 10s = 300s for cold start under load
    periodSeconds: 10
    timeoutSeconds: 30
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# -- DAG Processor (Airflow 3.x: parses DAG files, separate from scheduler) --
dagProcessor:
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 200m
      memory: 512Mi

# -- Triggerer (required for deferrable operators) ---------------------
triggerer:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

# -- PostgreSQL subchart (embedded, dev only) --------------------------
# Pin to :latest — bitnami prunes specific version tags from Docker Hub.
postgresql:
  enabled: true
  image:
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

# -- Redis (not needed for KubernetesExecutor) -------------------------
redis:
  enabled: false

# -- StatsD (disable to save resources) --------------------------------
statsd:
  enabled: false

# -- DAG volume (hostPath PVC created by pv-local.yaml) ----------------
dags:
  persistence:
    enabled: true
    existingClaim: airflow-dags-pvc

# -- Secret key (dev only — not for production) ------------------------
webserverSecretKey: dev-secret-key-change-in-prod

# -- Config overrides --------------------------------------------------
config:
  api:
    auth_backends: "airflow.api.auth.backend.basic_auth"
    workers: "2"
  core:
    load_examples: "False"
  webserver:
    expose_config: "True"
    warn_deployment_exposure: "False"
  metrics:
    otel_on: "True"
    otel_host: "host.docker.internal"
    otel_port: "4318"
    otel_prefix: "airflow"
    otel_ssl_active: "False"
  traces:
    otel_on: "True"
    otel_host: "host.docker.internal"
    otel_port: "4318"
    otel_ssl_active: "False"
    otel_task_log_event: "True"
